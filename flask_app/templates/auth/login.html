{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="text-center mb-4">
            <h1 style="color: var(--dark-navy); font-weight: 700;">WorkSense AI</h1>
            <p class="text-muted">Log in to your Enterprise Dashboard</p>
        </div>
        
        <div class="auth-card">
            <form method="POST" action="{{ url_for('auth.login') }}">
                <div class="mb-3">
                    <label for="email" class="form-label fw-bold">Email Address</label>
                    <input type="email" class="form-control" id="email" name="email" required placeholder="name@company.com">
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label fw-bold">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required placeholder="••••••••">
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg">Log In</button>
                </div>
            </form>
            
            <hr class="my-4">
            
            <div class="text-center">
                <p class="mb-2"><a href="{{ url_for('auth.forgot_password') }}" class="text-decoration-none" style="color: var(--primary-blue);">Forgot password?</a></p>
                <p>Don't have an account? <a href="{{ url_for('auth.signup') }}" class="text-decoration-none fw-bold" style="color: var(--primary-blue);">Sign up</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
