{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="text-center mb-4">
            <h2 style="color: var(--dark-navy); font-weight: 700;">Reset Password</h2>
            <p class="text-muted">Enter your email and a new password</p>
        </div>
        
        <div class="auth-card">
            <form method="POST" action="{{ url_for('auth.forgot_password') }}">
                <div class="mb-3">
                    <label for="email" class="form-label fw-bold">Email Address</label>
                    <input type="email" class="form-control" id="email" name="email" required placeholder="name@company.com">
                </div>
                <div class="mb-4">
                    <label for="new_password" class="form-label fw-bold">New Password</label>
                    <input type="password" class="form-control" id="new_password" name="new_password" required minlength="6" placeholder="••••••••">
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg">Reset Password</button>
                </div>
            </form>
            
            <hr class="my-4">
            
            <div class="text-center">
                <p>Remember your password? <a href="{{ url_for('auth.login') }}" class="text-decoration-none fw-bold" style="color: var(--primary-blue);">Log in</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
