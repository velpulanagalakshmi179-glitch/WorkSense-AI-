{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="text-center mb-4">
            <h2 style="color: var(--dark-navy); font-weight: 700;">Create an Account</h2>
            <p class="text-muted">Join WorkSense AI today</p>
        </div>
        
        <div class="auth-card">
            <form method="POST" action="{{ url_for('auth.signup') }}">
                <div class="mb-3">
                    <label for="name" class="form-label fw-bold">Full Name</label>
                    <input type="text" class="form-control" id="name" name="name" required placeholder="John Doe">
                </div>
                <div class="mb-3">
                    <label for="email" class="form-label fw-bold">Email Address</label>
                    <input type="email" class="form-control" id="email" name="email" required placeholder="name@company.com">
                </div>
                <div class="mb-3">
                    <label for="password" class="form-label fw-bold">Password</label>
                    <input type="password" class="form-control" id="password" name="password" required minlength="6" placeholder="••••••••">
                </div>
                <div class="mb-3">
                    <label for="organization" class="form-label fw-bold">Organization (Optional)</label>
                    <input type="text" class="form-control" id="organization" name="organization" placeholder="Company Name">
                </div>
                <div class="mb-4">
                    <label for="role" class="form-label fw-bold">Role (Optional)</label>
                    <input type="text" class="form-control" id="role" name="role" placeholder="e.g. Product Manager">
                </div>
                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-primary btn-lg">Sign Up</button>
                </div>
            </form>
            
            <hr class="my-4">
            
            <div class="text-center">
                <p>Already have an account? <a href="{{ url_for('auth.login') }}" class="text-decoration-none fw-bold" style="color: var(--primary-blue);">Log in</a></p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
